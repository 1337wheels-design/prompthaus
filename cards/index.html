<script>
const CARDS = [
  {
    zone: 'I',
    name: 'THE LONG RAIL',
    effect: 'When this card is activated, select 1 Skater monster on your field. That monster may attempt any grind or slide without Speed tribute until End Phase. Consecutive tricks in a chain each gain +100 ATK — commitment compounds. This obstacle rewards clean feet and locked-in conviction.',
    atk: 'LOCKED IN',
    def: 'STEADY GRIND',
  },
  {
    zone: 'II',
    name: 'STAIR SET + HUBBA',
    effect: 'Select 1 rail or ledge adjacent to the stairs. Until the End Phase, you may grind, slide, or gap this obstacle freely. Handrail attempts require a Speed tribute. Hubba ledge is waxed — no tribute needed. If you miss the landing, take 300 damage.',
    atk: 'KINETIC ENERGY',
    def: 'LOCKED GRIND',
  },
  {
    zone: 'III',
    name: 'THE WEDGE HIP',
    effect: 'When a Skater monster approaches this zone: You may transfer speed into air. Hip transfers are treated as combo extenders — your trick chain is not interrupted. Caveman and wallride attempts gain +200 ATK. This card remains active for the full session.',
    atk: 'AIR TIME',
    def: 'SMOOTH ROLL-IN',
  },
  {
    zone: 'IV',
    name: 'THE PYRAMID',
    effect: 'This obstacle may be approached from any angle. When a Skater monster grinds the apex ledge, draw 1 bonus Trick card. Manual attempts on the flat top gain +150 ATK. If a kickflip or heelflip is landed off the peak, all your Skater monsters gain 200 ATK until the End Phase.',
    atk: 'APEX CONTROL',
    def: 'FLAT TOP HOLD',
  },
  {
    zone: 'V',
    name: 'THE BANK TO BANK',
    effect: 'The centerpiece of the arena. When this card is active, all Skater monsters gain momentum as they approach. Speed rolls freely across this zone. Combos begun here may extend to any adjacent Zone without tribute. The sun rises and sets behind this spot — it witnesses everything.',
    atk: 'FULL SEND',
    def: 'CONCRETE LEGACY',
  },
];

/* ── Canvas art drawing ── */

function drawSky(ctx, W, H, sunX, sunY) {
  // Deep sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  sky.addColorStop(0,   '#0c1828');
  sky.addColorStop(0.35,'#182438');
  sky.addColorStop(0.7, '#2c2c14');
  sky.addColorStop(1,   '#382810');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Sun burst
  const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, W * 0.6);
  sun.addColorStop(0,    'rgba(255,210,70,0.95)');
  sun.addColorStop(0.04, 'rgba(255,160,30,0.65)');
  sun.addColorStop(0.15, 'rgba(255,100,10,0.28)');
  sun.addColorStop(0.35, 'rgba(220,70,0,0.10)');
  sun.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = sun;
  ctx.fillRect(0, 0, W, H);
}

function drawGround(ctx, W, H, yStart) {
  const g = ctx.createLinearGradient(0, yStart, 0, H);
  g.addColorStop(0, '#3a3828');
  g.addColorStop(0.4,'#2e2c1e');
  g.addColorStop(1,  '#1a1810');
  ctx.fillStyle = g;
  ctx.fillRect(0, yStart, W, H - yStart);
}

function addGrain(ctx, W, H) {
  for (let i = 0; i < 900; i++) {
    const x = (Math.random() * W) | 0;
    const y = (Math.random() * H) | 0;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.06})`;
    ctx.fillRect(x, y, 1, 1);
  }
}

function drawZoneI(ctx, W, H) {
  // Long rail — flat ground, low perspective rail
  drawSky(ctx, W, H, W * 0.72, H * 0.18);
  drawGround(ctx, W, H, H * 0.62);

  // Concrete platform shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, H * 0.6, W, H * 0.08);

  // Rail (long, slight perspective rise left to right)
  const ry1 = H * 0.58, ry2 = H * 0.52;
  const rx1 = W * 0.06, rx2 = W * 0.94;

  // Rail pipe (lower edge)
  ctx.beginPath();
  ctx.moveTo(rx1, ry1 + 4); ctx.lineTo(rx2, ry2 + 4);
  ctx.lineWidth = 7; ctx.strokeStyle = '#505050'; ctx.stroke();
  // Rail top (highlight)
  ctx.beginPath();
  ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry2);
  ctx.lineWidth = 3; ctx.strokeStyle = '#a0a0a0'; ctx.stroke();
  // Sheen
  ctx.beginPath();
  ctx.moveTo(rx1, ry1 - 1); ctx.lineTo(rx2, ry2 - 1);
  ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,240,180,0.6)'; ctx.stroke();

  // Support legs (3 legs)
  [0.25, 0.5, 0.75].forEach(t => {
    const lx = rx1 + (rx2 - rx1) * t;
    const topY = ry1 + (ry2 - ry1) * t;
    const botY = H * 0.62;
    ctx.beginPath(); ctx.moveTo(lx, topY + 4); ctx.lineTo(lx - 2, botY);
    ctx.lineWidth = 4; ctx.strokeStyle = '#444'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx, topY + 4); ctx.lineTo(lx + 2, botY);
    ctx.lineWidth = 4; ctx.strokeStyle = '#444'; ctx.stroke();
  });

  addGrain(ctx, W, H);
}

function drawZoneII(ctx, W, H) {
  // Stair Set + Hubba
  drawSky(ctx, W, H, W * 0.74, H * 0.16);

  // Steps: 5 steps ascending left→right
  const steps = 5;
  const stepW = W * 0.56 / steps;
  const stepH = H * 0.064;
  const baseX = W * 0.08;
  const baseY = H * 0.82;

  for (let i = 0; i < steps; i++) {
    const x = baseX + i * stepW;
    const y = baseY - i * stepH;
    // Tread (top face)
    ctx.fillStyle = `hsl(50,8%,${32 + i * 2}%)`;
    ctx.fillRect(x, y, W * 0.56 - i * stepW + stepW, stepH * 0.3);
    // Riser (front face)
    ctx.fillStyle = `hsl(50,8%,${22 + i * 2}%)`;
    ctx.fillRect(x, y + stepH * 0.3, stepW + (steps - i - 1) * stepW * 0.5, stepH * 0.7);
  }
  // Ground
  ctx.fillStyle = '#2e2c1e';
  ctx.fillRect(0, baseY + stepH * 0.3, W, H - baseY - stepH * 0.3);

  // Handrail (diagonal)
  const hrx1 = baseX + stepW * 0.5, hry1 = baseY + stepH * 0.1;
  const hrx2 = baseX + W * 0.52,    hry2 = baseY - steps * stepH + stepH * 0.1;
  ctx.beginPath(); ctx.moveTo(hrx1, hry1 + 4); ctx.lineTo(hrx2, hry2 + 4);
  ctx.lineWidth = 7; ctx.strokeStyle = '#484848'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hrx1, hry1); ctx.lineTo(hrx2, hry2);
  ctx.lineWidth = 3; ctx.strokeStyle = '#909090'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hrx1, hry1 - 1); ctx.lineTo(hrx2, hry2 - 1);
  ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,230,160,0.55)'; ctx.stroke();

  // Hubba ledge (right of stairs)
  const hx = baseX + W * 0.53, hy = hry2 - 2, hw = W * 0.3, hh = steps * stepH + stepH;
  ctx.fillStyle = '#585850';
  ctx.fillRect(hx, hy, hw, hh);
  // Hubba top
  ctx.fillStyle = '#787868';
  ctx.fillRect(hx, hy, hw, stepH * 0.28);
  // Hubba side shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(hx, hy, 4, hh);
  // Wax sheen on top
  ctx.fillStyle = 'rgba(255,240,180,0.18)';
  ctx.fillRect(hx + 4, hy + 1, hw - 8, 3);

  addGrain(ctx, W, H);
}

function drawZoneIII(ctx, W, H) {
  // Wedge Hip
  drawSky(ctx, W, H, W * 0.82, H * 0.15);

  const groundY = H * 0.78;
  ctx.fillStyle = '#2e2c1e';
  ctx.fillRect(0, groundY, W, H - groundY);

  // Left wedge (ramp surface facing viewer)
  ctx.fillStyle = '#484840';
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W * 0.44, H * 0.44);
  ctx.lineTo(W * 0.44, groundY);
  ctx.closePath(); ctx.fill();

  // Left wedge face (darker front)
  const wfGrad = ctx.createLinearGradient(0, H * 0.44, W * 0.44, groundY);
  wfGrad.addColorStop(0, '#383830');
  wfGrad.addColorStop(1, '#484840');
  ctx.fillStyle = wfGrad;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W * 0.44, H * 0.44);
  ctx.lineTo(W * 0.44, H * 0.44 + 6);
  ctx.lineTo(0, groundY + 6);
  ctx.closePath(); ctx.fill();

  // Hip transition (the curved connector between left and right)
  ctx.fillStyle = '#525248';
  ctx.beginPath();
  ctx.moveTo(W * 0.38, H * 0.46);
  ctx.quadraticCurveTo(W * 0.5, H * 0.40, W * 0.62, H * 0.46);
  ctx.lineTo(W * 0.62, H * 0.56);
  ctx.quadraticCurveTo(W * 0.5, H * 0.50, W * 0.38, H * 0.56);
  ctx.closePath(); ctx.fill();
  // Hip edge highlight
  ctx.beginPath();
  ctx.moveTo(W * 0.38, H * 0.46);
  ctx.quadraticCurveTo(W * 0.5, H * 0.40, W * 0.62, H * 0.46);
  ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(200,190,140,0.5)'; ctx.stroke();

  // Right wedge (going away)
  ctx.fillStyle = '#404038';
  ctx.beginPath();
  ctx.moveTo(W * 0.56, H * 0.46);
  ctx.lineTo(W, H * 0.68);
  ctx.lineTo(W, groundY);
  ctx.lineTo(W * 0.56, groundY);
  ctx.closePath(); ctx.fill();

  addGrain(ctx, W, H);
}

function drawZoneIV(ctx, W, H) {
  // Pyramid
  drawSky(ctx, W, H, W * 0.5, H * 0.14);
  drawGround(ctx, W, H, H * 0.76);

  // Perspective lines (vanishing toward pyramid)
  ctx.strokeStyle = 'rgba(180,160,80,0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const t = (i + 1) / 6;
    ctx.beginPath();
    ctx.moveTo(W * t, H * 0.76);
    ctx.lineTo(W * 0.5, H * 0.42);
    ctx.stroke();
  }

  // Base slab (bottom)
  ctx.fillStyle = '#303028';
  ctx.beginPath();
  ctx.moveTo(W * 0.1, H * 0.78);
  ctx.lineTo(W * 0.9, H * 0.78);
  ctx.lineTo(W * 0.82, H * 0.72);
  ctx.lineTo(W * 0.18, H * 0.72);
  ctx.closePath(); ctx.fill();

  // Right face
  ctx.fillStyle = '#404038';
  ctx.beginPath();
  ctx.moveTo(W * 0.82, H * 0.72);
  ctx.lineTo(W * 0.9, H * 0.78);
  ctx.lineTo(W * 0.65, H * 0.49);
  ctx.lineTo(W * 0.62, H * 0.44);
  ctx.closePath(); ctx.fill();

  // Left face
  ctx.fillStyle = '#303028';
  ctx.beginPath();
  ctx.moveTo(W * 0.18, H * 0.72);
  ctx.lineTo(W * 0.1, H * 0.78);
  ctx.lineTo(W * 0.38, H * 0.49);
  ctx.lineTo(W * 0.38, H * 0.44);
  ctx.closePath(); ctx.fill();

  // Top face (flat top ledge)
  ctx.fillStyle = '#606058';
  ctx.beginPath();
  ctx.moveTo(W * 0.38, H * 0.44);
  ctx.lineTo(W * 0.62, H * 0.44);
  ctx.lineTo(W * 0.65, H * 0.49);
  ctx.lineTo(W * 0.35, H * 0.49);
  ctx.closePath(); ctx.fill();
  // Ledge wax sheen
  ctx.fillStyle = 'rgba(255,240,180,0.15)';
  ctx.fillRect(W * 0.38, H * 0.44, W * 0.24, 3);

  // Peak edge
  ctx.beginPath();
  ctx.moveTo(W * 0.38, H * 0.44); ctx.lineTo(W * 0.62, H * 0.44);
  ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(200,190,140,0.55)'; ctx.stroke();

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(W * 0.5, H * 0.77, W * 0.38, H * 0.025, 0, 0, Math.PI * 2);
  ctx.fill();

  addGrain(ctx, W, H);
}

function drawZoneV(ctx, W, H) {
  // Bank to Bank (the centerpiece)
  drawSky(ctx, W, H, W * 0.68, H * 0.15);

  const groundY = H * 0.7;

  // Ground between banks
  ctx.fillStyle = '#282616';
  ctx.fillRect(0, groundY, W, H - groundY);

  // Left bank (angled ramp, perspective from below)
  const lbGrad = ctx.createLinearGradient(0, H * 0.45, W * 0.46, groundY);
  lbGrad.addColorStop(0, '#555048');
  lbGrad.addColorStop(1, '#383620');
  ctx.fillStyle = lbGrad;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.85);
  ctx.lineTo(0, H * 0.62);
  ctx.lineTo(W * 0.44, H * 0.45);
  ctx.lineTo(W * 0.44, groundY);
  ctx.closePath(); ctx.fill();

  // Left bank surface highlight (sun catching top edge)
  ctx.fillStyle = 'rgba(255,220,100,0.18)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.62); ctx.lineTo(W * 0.44, H * 0.45);
  ctx.lineTo(W * 0.44, H * 0.45 + 8); ctx.lineTo(0, H * 0.62 + 8);
  ctx.closePath(); ctx.fill();

  // Left bank front shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.85); ctx.lineTo(W * 0.44, groundY);
  ctx.lineTo(W * 0.44, groundY + 4); ctx.lineTo(0, H * 0.85 + 4);
  ctx.closePath(); ctx.fill();

  // Center riding channel (low point)
  ctx.fillStyle = '#1c1a0e';
  ctx.fillRect(W * 0.38, H * 0.68, W * 0.24, H * 0.32);

  // Right bank (mirror)
  const rbGrad = ctx.createLinearGradient(W * 0.56, H * 0.45, W, groundY);
  rbGrad.addColorStop(0, '#4c4840');
  rbGrad.addColorStop(1, '#302e1c');
  ctx.fillStyle = rbGrad;
  ctx.beginPath();
  ctx.moveTo(W, H * 0.85);
  ctx.lineTo(W, H * 0.62);
  ctx.lineTo(W * 0.56, H * 0.45);
  ctx.lineTo(W * 0.56, groundY);
  ctx.closePath(); ctx.fill();

  // Right bank sun highlight (less sun on right)
  ctx.fillStyle = 'rgba(255,180,60,0.10)';
  ctx.beginPath();
  ctx.moveTo(W, H * 0.62); ctx.lineTo(W * 0.56, H * 0.45);
  ctx.lineTo(W * 0.56, H * 0.45 + 8); ctx.lineTo(W, H * 0.62 + 8);
  ctx.closePath(); ctx.fill();

  // Long shadow across ground (very Zone V feel)
  const shadGrad = ctx.createLinearGradient(0, groundY, W * 0.4, groundY + 40);
  shadGrad.addColorStop(0, 'rgba(0,0,0,0.4)');
  shadGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadGrad;
  ctx.fillRect(0, groundY, W * 0.45, 55);

  addGrain(ctx, W, H);
}

const DRAW_FNS = [drawZoneI, drawZoneII, drawZoneIII, drawZoneIV, drawZoneV];

function buildCard(data, idx) {
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="c-corner tl"></div>
    <div class="c-corner tr"></div>
    <div class="c-corner bl"></div>
    <div class="c-corner br"></div>

    <div class="card-header">
      <h2 class="card-name">${data.name}</h2>
      <div class="spell-badge">
        <span class="badge-top">SPELL</span>
        <span class="badge-kanji">魔</span>
      </div>
    </div>

    <div class="type-line">
      <span class="type-text">[ Field Spell &mdash; Zone ${data.zone} ]</span>
    </div>

    <div class="art-wrap">
      <canvas class="card-canvas" width="286" height="185"></canvas>
      <span class="art-star tl">&#x2726;</span>
      <span class="art-star tr">&#x2726;</span>
      <span class="art-star bl">&#x2726;</span>
      <span class="art-star br">&#x2726;</span>
    </div>

    <div class="text-box">
      <div class="tb-corner tl"></div>
      <div class="tb-corner tr"></div>
      <div class="tb-corner bl"></div>
      <div class="tb-corner br"></div>
      <p class="effect-text">${data.effect}</p>
      <div class="atk-def">
        ATK:&nbsp;<span class="atk-val">${data.atk}</span>
        &nbsp;/&nbsp;
        DEF:&nbsp;<span class="def-val">${data.def}</span>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-corner l">&#9733;</span>
      <span class="footer-id">UPARK-VOL2</span>
      <span class="footer-logo">&#220;</span>
      <span class="footer-zone">ZONE-${data.zone}</span>
      <span class="footer-corner r">&#9733;</span>
    </div>
  `;

  // Draw canvas art
  requestAnimationFrame(() => {
    const canvas = card.querySelector('.card-canvas');
    DRAW_FNS[idx](canvas.getContext('2d'), canvas.width, canvas.height);
  });

  return card;
}

document.addEventListener('DOMContentLoaded', () => {
  const gallery = document.getElementById('gallery');
  CARDS.forEach((c, i) => gallery.appendChild(buildCard(c, i)));
});
</script>
