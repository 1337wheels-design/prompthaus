<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PAYDAY DECK EDITOR — Üpark Payday 2026</title>
<style>
:root {
  --bg:      #040e0c;
  --panel:   #071210;
  --border:  rgba(240,208,80,0.18);
  --gold:    #f0d060;
  --gold-lo: #7a5008;
  --coral:   #ff6b47;
  --aqua:    #00c8b0;
  --silver:  #d0d0d2;
  --dim:     rgba(208,208,210,0.45);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Courier New', Courier, monospace;
  color: var(--silver);
  padding: 32px 16px 56px;
  user-select: none;
}

/* ── header ───────────────────────────────────────── */
.hd { text-align:center; margin-bottom:28px; }
.hd h1 {
  font-size: clamp(1.1rem,3.5vw,1.9rem);
  letter-spacing:.35em; color:var(--gold);
  text-transform:uppercase; line-height:1;
  margin-bottom:8px;
}
.hd .sub {
  font-size:.55rem; letter-spacing:.22em;
  color:var(--aqua); text-transform:uppercase;
}
.hd .nav-link {
  font-size:.5rem; letter-spacing:.15em;
  color:var(--dim); text-decoration:none;
  border-bottom:1px solid transparent;
  transition:color .15s, border-color .15s;
  margin-top:10px; display:inline-block;
}
.hd .nav-link:hover { color:var(--silver); border-color:var(--silver); }

/* ── workspace ────────────────────────────────────── */
.workspace {
  display:grid;
  grid-template-columns: 180px auto 140px;
  gap:20px;
  align-items:start;
  width:100%;
  max-width:700px;
}

/* ── panels ───────────────────────────────────────── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 14px 12px;
  display:flex; flex-direction:column; gap:14px;
}
#leftPanel {
  max-height: 700px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(208,208,210,0.2) transparent;
}
.panel-title {
  font-size:.5rem; letter-spacing:.25em;
  color:var(--gold); text-transform:uppercase;
  border-bottom:1px solid var(--border); padding-bottom:8px;
}

/* ── obstacle presets ─────────────────────────────── */
.presets {
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
}
.preset-btn {
  position:relative; height:52px; border:1px solid transparent;
  cursor:pointer; overflow:hidden; transition:border-color .15s;
  background:none; padding:0;
}
.preset-btn:hover, .preset-btn.active { border-color:var(--gold); }
.preset-btn canvas { width:100%; height:100%; display:block; }
.preset-btn .zone-tag {
  position:absolute; bottom:2px; left:3px;
  font-size:.38rem; letter-spacing:.12em;
  color:rgba(255,255,255,0.75); text-shadow:0 0 4px #000;
  pointer-events:none;
}

/* ── canvas area ──────────────────────────────────── */
.canvas-wrap {
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
#mainCanvas {
  display:block;
  width:200px; height:700px;
  cursor:crosshair;
  filter: drop-shadow(0 6px 24px rgba(0,0,0,0.9)) drop-shadow(0 2px 8px rgba(95,58,114,0.35));
  touch-action:none;
}
.undo-row {
  display:flex; gap:8px;
}

/* ── tool panel ───────────────────────────────────── */
.tools { display:flex; flex-direction:column; gap:10px; }
.tool-group { display:flex; flex-direction:column; gap:6px; }
.tool-group-label {
  font-size:.44rem; letter-spacing:.18em;
  color:var(--dim); text-transform:uppercase;
}
.tool-btn {
  background:transparent; border:1px solid rgba(208,208,210,0.25);
  color:var(--silver); font-family:inherit;
  font-size:.5rem; letter-spacing:.15em;
  padding:7px 8px; cursor:pointer; text-align:left;
  text-transform:uppercase; transition:all .12s;
  width:100%;
}
.tool-btn:hover { border-color:var(--gold); color:var(--gold); }
.tool-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(240,208,80,0.07); }

.size-row {
  display:flex; gap:5px;
}
.size-btn {
  flex:1; background:transparent;
  border:1px solid rgba(208,208,210,0.2);
  color:var(--dim); font-family:inherit;
  font-size:.45rem; padding:5px 2px;
  cursor:pointer; text-align:center;
  transition:all .12s;
}
.size-btn.active, .size-btn:hover {
  border-color:var(--aqua); color:var(--aqua);
}

.toggle-row {
  display:flex; align-items:center; gap:8px;
}
.toggle-label { font-size:.48rem; letter-spacing:.1em; color:var(--dim); }
.toggle-btn {
  width:32px; height:18px; position:relative;
  background:rgba(208,208,210,0.15); border:1px solid rgba(208,208,210,0.2);
  cursor:pointer; border-radius:9px; transition:background .15s;
  flex-shrink:0;
}
.toggle-btn.on { background:rgba(0,200,176,0.35); border-color:var(--aqua); }
.toggle-btn::after {
  content:''; position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%;
  background:var(--silver); transition:left .15s;
}
.toggle-btn.on::after { left:16px; background:var(--aqua); }

.action-btn {
  background:transparent; border:1px solid var(--gold);
  color:var(--gold); font-family:inherit;
  font-size:.5rem; letter-spacing:.18em;
  padding:8px 6px; cursor:pointer;
  text-transform:uppercase; transition:all .12s;
  width:100%; text-align:center;
}
.action-btn:hover { background:var(--gold); color:var(--bg); }
.action-btn.danger {
  border-color:var(--coral); color:var(--coral);

.action-btn.danger:hover { background:var(--coral); color:#fff; }

/* ── responsive ───────────────────────────────────── */
@media (max-width:580px) {
  .workspace {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    max-width:320px;

  .presets { grid-template-columns:repeat(4,1fr); }
  .preset-btn { height:38px; }
  #mainCanvas { width:200px; height:700px; }
}

<script>




// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let showLogo = true;
let logoOpacity = 1.0;
let logoScale = 0.85;

// Canvases
const W = 400, H = 1400;
  const ILLUS_H = 970, ILLUS_Y = 215;
  const ILLUSTRATION_BG = ['#2a1008', '#182030', '#181828', '#201810', '#0e2010', '#282030', '#2a0820'];
const bgCanvas = document.createElement('canvas');
bgCanvas.width = W; bgCanvas.height = H;
const bgCtx = bgCanvas.getContext('2d');

// Logo image
let logoImg = null;

const imgEl = new Image();
imgEl.onload  = () => { logoImg = imgEl; redraw(); };
imgEl.onerror = () => { redraw(); };
function getLogoImg() { return logoImg; }
imgEl.src = 'payday_logo_aligned.png';

// ═══════════════════════════════════════════════════════
//  DECK PATH (100×350 → scaled 4× to 400×1400)
// ═══════════════════════════════════════════════════════
const DECK_PATH_STR = 'M 200,0 C 310.4,0 400,89.6 400,200 L 400,1200 C 400,1310.4 310.4,1400 200,1400 C 89.6,1400 0,1310.4 0,1200 L 0,200 C 0,89.6 89.6,0 200,0 Z';
function getDeckPath() { return new Path2D(DECK_PATH_STR); }

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function redraw() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const path = getDeckPath();

  ctx.clearRect(0, 0, W, H);

  // 1. background layer (clipped)
  ctx.save();
  ctx.clip(path);
  ctx.drawImage(bgCanvas, 0, 0);
  ctx.restore();

  // 2. logo overlay (centered, no rotation — logo PNG is pre-rotated)
  const _li = getLogoImg();
  if (showLogo && _li) {
    const drawH = H * logoScale;
    const drawW = drawH * (_li.naturalWidth / _li.naturalHeight);
    ctx.save();
    ctx.clip(path);
    ctx.translate(W / 2, H / 2);
    ctx.rotate(-5 * Math.PI / 180);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = logoOpacity;
    ctx.drawImage(_li, -drawW / 2, -drawH / 2, drawW, drawH);
    ctx.restore();
  }

  // 4. edge highlight
  ctx.save();
  ctx.strokeStyle = 'rgba(208,208,210,0.40)';
  ctx.lineWidth = 1.5;
  ctx.stroke(path);
  ctx.restore();
}

function clearAllPresetBtns() {
  document.querySelectorAll('#camo-presets .preset-btn, #illustration-presets .preset-btn').forEach(b => b.classList.remove('active'));
}


// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function setBgStyle(s) {
  camoStyle = s;
  document.getElementById('bg-blob').classList.toggle('active', s === 'blob');
  document.getElementById('bg-linear').classList.toggle('active', s === 'linear');
  redrawCamoThumbnails();
  if (activeMode === 'camo') applyCamo(activeCamo);
  else if (activeMode === 'illustration') applyIllustration(activeIllustration);
  else if (activeMode === 'custom') applyCustom();
}

function redrawCamoThumbnails() {
  const mpath = new Path2D('M 30,0 C 46.6,0 60,13.4 60,30 L 60,50 C 60,66.6 46.6,80 30,80 C 13.4,80 0,66.6 0,50 L 0,30 C 0,13.4 13.4,0 30,0 Z');
  document.querySelectorAll('#camo-presets .preset-btn').forEach((btn, i) => {
    const mc = btn.querySelector('canvas');
    if (!mc) return;
    const mctx = mc.getContext('2d');
    mctx.clearRect(0, 0, 60, 80);
    mctx.save();
    mctx.clip(mpath);
    drawBg(mctx, 60, 80, CAMO_PATTERNS[i].palettes, CAMO_PATTERNS[i].seed);
    mctx.restore();
    mctx.strokeStyle = 'rgba(255,255,255,0.40)';
    mctx.lineWidth = 1;
    mctx.stroke(mpath);
  });
}

function toggleLogo() {
  showLogo = !showLogo;
  const btn = document.getElementById('logoToggle');
  btn.classList.toggle('on', showLogo);
  redraw();
}

function download() {
  // Composite to offscreen at full res
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const octx = out.getContext('2d');
  const path = getDeckPath();

  octx.clip(path);
  octx.drawImage(bgCanvas, 0, 0);

  const _dli = getLogoImg();
  if (showLogo && _dli) {
    const drawH = H * logoScale;
    const drawW = drawH * (_dli.naturalWidth / _dli.naturalHeight);
    octx.save();
    octx.translate(W / 2, H / 2);
    octx.rotate(-5 * Math.PI / 180);
    octx.globalCompositeOperation = 'source-over';
    octx.globalAlpha = logoOpacity;
    octx.drawImage(_dli, -drawW / 2, -drawH / 2, drawW, drawH);
    octx.restore();
  }

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'payday_deck_camo.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}


// ═══════════════════════════════════════════════════════
//  CAMO PATTERNS
// ═══════════════════════════════════════════════════════
function mkRng2(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967296; };
}

function drawCamoBlobs(ctx, w, h, palettes, seed) {
  const rng = mkRng2(seed);
  ctx.fillStyle = palettes[0][0];
  ctx.fillRect(0, 0, w, h);
  palettes.forEach((palette, pi) => {
    const count = 18 + pi * 8;
    for (let b = 0; b < count; b++) {
      const cx = rng() * w;
      const cy = rng() * h * 1.6 - h * 0.3;
      const rx = (rng() * 0.2 + 0.06) * w;
      const ry = (rng() * 0.16 + 0.06) * h;
      const pts = 5 + Math.floor(rng() * 4);
      ctx.beginPath();
      for (let p = 0; p < pts; p++) {
        const a = (p / pts) * Math.PI * 2;
        const an = ((p + 1) / pts) * Math.PI * 2;
        const pr = 0.6 + rng() * 0.7;
        const x1 = cx + Math.cos(a) * rx * pr;
        const y1 = cy + Math.sin(a) * ry * pr;
        const xc = cx + Math.cos((a+an)/2) * rx * (0.5 + rng() * 0.5);
        const yc = cy + Math.sin((a+an)/2) * ry * (0.5 + rng() * 0.5);
        const x2 = cx + Math.cos(an) * rx * (0.6 + rng() * 0.7);
        const y2 = cy + Math.sin(an) * ry * (0.6 + rng() * 0.7);
        if (p === 0) ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(xc, yc, x2, y2);
      }
      ctx.closePath();
      ctx.fillStyle = palette[Math.floor(rng() * palette.length)];
      ctx.fill();
    }
  });
}

function makeMonoPalette(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const h2 = (v) => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');
  const mk = (rv,gv,bv) => '#'+h2(rv)+h2(gv)+h2(bv);
  const dk = (f) => mk(r*f, g*f, b*f);
  const lt = (f,t) => mk(r*f+(255-r)*t, g*f+(255-g)*t, b*f+(255-b)*t);
  return [
    [dk(0.30), dk(0.36), dk(0.42), dk(0.48)],
    [dk(0.55), dk(0.65), dk(0.75), dk(0.85)],
    [dk(0.88), dk(0.93), dk(0.97), dk(1.00)],
    [lt(0.90,0.05), lt(0.85,0.10), lt(0.80,0.15), lt(0.70,0.22)],
  ];
}

// Fade top+bottom edges of illustration box — optionally blends through illustration edge colors
function drawIllusEdgeFades(ctx, w, illusY, illusH, bgColor, topColor, bottomColor) {
  const toRgb = hex => [1,3,5].map(o => parseInt(hex.slice(o,o+2),16));
  const fadeH = Math.round(illusH * 0.235);
  const [br,bg_,bb] = toRgb(bgColor);
  // Top fade: camo bg → illustration edge color (or bg if none) → transparent
  const topGrad = ctx.createLinearGradient(0, illusY, 0, illusY + fadeH);
  topGrad.addColorStop(0, `rgba(${br},${bg_},${bb},1)`);
  if (topColor) {
    const [tr,tg,tb] = toRgb(topColor);
    topGrad.addColorStop(0.55, `rgba(${tr},${tg},${tb},0.75)`);
    topGrad.addColorStop(1,    `rgba(${tr},${tg},${tb},0)`);
  } else {
    topGrad.addColorStop(1, `rgba(${br},${bg_},${bb},0)`);
  }
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, illusY, w, fadeH);
  // Bottom fade: transparent → illustration edge color (or bg if none) → camo bg
  const ec = bottomColor || bgColor;
  const [er,eg,eb] = toRgb(ec);
  const botGrad = ctx.createLinearGradient(0, illusY + illusH - fadeH, 0, illusY + illusH);
  if (bottomColor) {
    botGrad.addColorStop(0,    `rgba(${er},${eg},${eb},0)`);
    botGrad.addColorStop(0.45, `rgba(${er},${eg},${eb},0.75)`);
    botGrad.addColorStop(1,    `rgba(${br},${bg_},${bb},1)`);
  } else {
    botGrad.addColorStop(0, `rgba(${br},${bg_},${bb},0)`);
    botGrad.addColorStop(1, `rgba(${br},${bg_},${bb},1)`);
  }
  ctx.fillStyle = botGrad;
  ctx.fillRect(0, illusY + illusH - fadeH, w, fadeH);
}

// Overdraws white letterbox bands with the camo pattern so camo "bleeds into" the illustration
function drawCamoBleedBands(ctx, ctxW, ctxH, illusY, illusH, palette, seed, bands) {
  if (bands.topFrac) {
    const topH = Math.round(illusH * bands.topFrac);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, illusY, ctxW, topH); ctx.clip();
    drawCamoBlobs(ctx, ctxW, ctxH, palette, seed);
    ctx.restore();
  }
  if (bands.bottomFrac) {
    const botH = Math.round(illusH * bands.bottomFrac);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, illusY + illusH - botH, ctxW, botH); ctx.clip();
    drawCamoBlobs(ctx, ctxW, ctxH, palette, seed);
    ctx.restore();
  }
}

function drawCamoEdgeBleed(ctx, w, h, illusY, illusH, palette, seed) {
  const fadeH = Math.round(illusH * 0.20);
  const topOfc = document.createElement('canvas');
  topOfc.width = w; topOfc.height = fadeH;
  const tc = topOfc.getContext('2d');
  tc.save(); tc.translate(0, -illusY); drawCamoBlobs(tc, w, h, palette, seed); tc.restore();
  const tg = tc.createLinearGradient(0, 0, 0, fadeH);
  tg.addColorStop(0, 'rgba(0,0,0,1)'); tg.addColorStop(1, 'rgba(0,0,0,0)');
  tc.globalCompositeOperation = 'destination-in';
  tc.fillStyle = tg; tc.fillRect(0, 0, w, fadeH);
  ctx.drawImage(topOfc, 0, illusY);
  const botOfc = document.createElement('canvas');
  botOfc.width = w; botOfc.height = fadeH;
  const bc = botOfc.getContext('2d');
  bc.save(); bc.translate(0, -(illusY + illusH - fadeH)); drawCamoBlobs(bc, w, h, palette, seed); bc.restore();
  const bg_ = bc.createLinearGradient(0, 0, 0, fadeH);
  bg_.addColorStop(0, 'rgba(0,0,0,0)'); bg_.addColorStop(1, 'rgba(0,0,0,1)');
  bc.globalCompositeOperation = 'destination-in';
  bc.fillStyle = bg_; bc.fillRect(0, 0, w, fadeH);
  ctx.drawImage(botOfc, 0, illusY + illusH - fadeH);
}

function drawLinearGradientBg(ctx, w, h, palette) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0,    palette[0][0]);
  g.addColorStop(0.33, palette[1][1]);
  g.addColorStop(0.66, palette[2][2]);
  g.addColorStop(1,    palette[3][3]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
}

function drawLinearEdgeBleed(ctx, w, h, illusY, illusH, palette) {
  const fadeH = Math.round(illusH * 0.20);
  function makeSlice(startY, fadeDir) {
    const ofc = document.createElement('canvas');
    ofc.width = w; ofc.height = fadeH;
    const oc = ofc.getContext('2d');
    const g = oc.createLinearGradient(0, -startY, 0, h - startY);
    g.addColorStop(0,    palette[0][0]);
    g.addColorStop(0.33, palette[1][1]);
    g.addColorStop(0.66, palette[2][2]);
    g.addColorStop(1,    palette[3][3]);
    oc.fillStyle = g; oc.fillRect(0, 0, w, fadeH);
    const ag = oc.createLinearGradient(0, 0, 0, fadeH);
    ag.addColorStop(fadeDir === 'top' ? 0 : 1, 'rgba(0,0,0,1)');
    ag.addColorStop(fadeDir === 'top' ? 1 : 0, 'rgba(0,0,0,0)');
    oc.globalCompositeOperation = 'destination-in';
    oc.fillStyle = ag; oc.fillRect(0, 0, w, fadeH);
    return ofc;
  }
  ctx.drawImage(makeSlice(illusY, 'top'), 0, illusY);
  ctx.drawImage(makeSlice(illusY + illusH - fadeH, 'bottom'), 0, illusY + illusH - fadeH);
}

function drawBg(ctx, w, h, palette, seed) {
  if (camoStyle === 'linear') drawLinearGradientBg(ctx, w, h, palette);
  else drawCamoBlobs(ctx, w, h, palette, seed);
}

function drawEdgeBleed(ctx, w, h, illusY, illusH, palette, seed) {
  if (camoStyle === 'linear') drawLinearEdgeBleed(ctx, w, h, illusY, illusH, palette);
  else drawCamoEdgeBleed(ctx, w, h, illusY, illusH, palette, seed);
}

// Canvas-side sky gradient overlay — draws on top of the SVG to restore vivid sky colors
// that vtracer posterized into dark/muddy tones
function drawSkyOverlay(ctx, w, illusY, illusH, overlay) {
  const skyH = Math.round(illusH * overlay.hFrac);
  const grad = ctx.createLinearGradient(0, illusY, 0, illusY + skyH);
  const stops = overlay.stops;
  const n = stops.length;
  stops.forEach((c, i) => {
    const [r,g,b] = [1,3,5].map(o => parseInt(c.slice(o,o+2),16));
    grad.addColorStop((i / (n - 1)) * 0.80, `rgba(${r},${g},${b},1)`);
  });
  const lc = stops[n - 1];
  const [lr,lg,lb] = [1,3,5].map(o => parseInt(lc.slice(o,o+2),16));
  grad.addColorStop(1, `rgba(${lr},${lg},${lb},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, illusY, w, skyH);
}

function drawIllustration(ctx, w, h, img, ox, oy) {
  ox = ox || 0; oy = oy || 0;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  const srcAspect = img.naturalWidth / img.naturalHeight;
  const dstAspect = w / h;
  let drawW, drawH, sx, sy;
  if (srcAspect > dstAspect) {
    drawH = h; drawW = h * srcAspect;
    sx = ox + (w - drawW) / 2; sy = oy;
  } else {
    drawW = w; drawH = w / srcAspect;
    sx = ox; sy = oy + (h - drawH) / 2;
  }
  ctx.drawImage(img, sx, sy, drawW, drawH);
}

const illustrationImgs = [];

function buildIllustrationPresets() {
  const container = document.getElementById('illustration-presets');
  ILLUSTRATION_DATA.forEach((ill, i) => {
    const mc = document.createElement('canvas');
    mc.width = 60; mc.height = 80;
    const mctx = mc.getContext('2d');
    const mpath = new Path2D('M 30,0 C 46.6,0 60,13.4 60,30 L 60,50 C 60,66.6 46.6,80 30,80 C 13.4,80 0,66.6 0,50 L 0,30 C 0,13.4 13.4,0 30,0 Z');

    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.id = 'ill-preset-' + i;
    btn.appendChild(mc);

    const tag = document.createElement('span');
    tag.className = 'zone-tag';
    tag.textContent = ill.name;
    tag.style.fontSize = '0.32rem';
    btn.appendChild(tag);

    btn.addEventListener('click', () => applyIllustration(i));
    container.appendChild(btn);

    const img = new Image();
    illustrationImgs.push(img);
    img.onload = () => {
      const ts = 80 / H;
      const tiy = Math.round(ILLUS_Y * ts);
      const tih = Math.round(ILLUS_H * ts);
      const till = ILLUSTRATION_DATA[i];
      mctx.save();
      mctx.clip(mpath);
      drawCamoBlobs(mctx, 60, 80, makeMonoPalette(ILLUSTRATION_BG[i]), illusBgSeed);
      mctx.beginPath(); mctx.rect(0, tiy, 60, tih); mctx.clip();
      drawIllustration(mctx, 60, tih, img, 0, tiy);
      if (till.skyOverlay) drawSkyOverlay(mctx, 60, tiy, tih, till.skyOverlay);
      if (till.whiteBands) drawCamoBleedBands(mctx, 60, 80, tiy, tih, makeMonoPalette(ILLUSTRATION_BG[i]), illusBgSeed, till.whiteBands);
      mctx.restore();
      mctx.save();
      mctx.clip(mpath);
      drawCamoEdgeBleed(mctx, 60, 80, tiy, tih, makeMonoPalette(ILLUSTRATION_BG[i]), illusBgSeed);
      mctx.restore();
      mctx.strokeStyle = 'rgba(255,255,255,0.40)';
      mctx.lineWidth = 1;
      mctx.stroke(mpath);
    };
    img.src = ill.src;
  });
}

function applyIllustration(idx) {
  activeMode = 'illustration';
  activeIllustration = idx;
  illusBgColor = ILLUSTRATION_BG[idx];
  const picker = document.getElementById('illusBgPicker');
  if (picker) picker.value = illusBgColor;
  clearAllPresetBtns();
  document.getElementById('ill-preset-' + idx).classList.add('active');
  const img = illustrationImgs[idx];
  bgCtx.clearRect(0, 0, W, H);
  drawBg(bgCtx, W, H, makeMonoPalette(illusBgColor), illusBgSeed);
  const ill = ILLUSTRATION_DATA[idx];
  const illusPalette = makeMonoPalette(illusBgColor);
  if (img.complete && img.naturalWidth > 0) {
    bgCtx.save();
    bgCtx.beginPath(); bgCtx.rect(0, ILLUS_Y, W, ILLUS_H); bgCtx.clip();
    drawIllustration(bgCtx, W, ILLUS_H, img, 0, ILLUS_Y);
    if (ill.skyOverlay) drawSkyOverlay(bgCtx, W, ILLUS_Y, ILLUS_H, ill.skyOverlay);
    if (ill.whiteBands) drawCamoBleedBands(bgCtx, W, H, ILLUS_Y, ILLUS_H, illusPalette, illusBgSeed, ill.whiteBands);
    bgCtx.restore();
    drawEdgeBleed(bgCtx, W, H, ILLUS_Y, ILLUS_H, illusPalette, illusBgSeed);
    redraw();
  } else {
    img.addEventListener('load', () => {
      bgCtx.save();
      bgCtx.beginPath(); bgCtx.rect(0, ILLUS_Y, W, ILLUS_H); bgCtx.clip();
      drawIllustration(bgCtx, W, ILLUS_H, img, 0, ILLUS_Y);
      if (ill.skyOverlay) drawSkyOverlay(bgCtx, W, ILLUS_Y, ILLUS_H, ill.skyOverlay);
      if (ill.whiteBands) drawCamoBleedBands(bgCtx, W, H, ILLUS_Y, ILLUS_H, illusPalette, illusBgSeed, ill.whiteBands);
      bgCtx.restore();
      drawEdgeBleed(bgCtx, W, H, ILLUS_Y, ILLUS_H, illusPalette, illusBgSeed);
      redraw();
    }, { once: true });
  }
}

function applyCustom() {
  if (!customImgEl) return;
  bgCtx.clearRect(0, 0, W, H);
  drawBg(bgCtx, W, H, makeMonoPalette(illusBgColor), illusBgSeed);
  bgCtx.save();
  bgCtx.beginPath(); bgCtx.rect(0, ILLUS_Y, W, ILLUS_H); bgCtx.clip();
  drawIllustration(bgCtx, W, ILLUS_H, customImgEl, 0, ILLUS_Y);
  bgCtx.restore();
  drawIllusEdgeFades(bgCtx, W, ILLUS_Y, ILLUS_H, illusBgColor);
  redraw();
}

// ═══════════════════════════════════════════════════════
//  HI-RES EXPORT (5000×10000, native resolution rendering)
// ═══════════════════════════════════════════════════════

function getExportDeckPath(s, ox, oy) {
  const r = 200 * s, cr = 110.4 * s, EW = 400 * s, EH = 1400 * s;
  return new Path2D(
    `M ${ox+r},${oy} C ${ox+r+cr},${oy} ${ox+EW},${oy+r-cr} ${ox+EW},${oy+r}` +
    ` L ${ox+EW},${oy+EH-r} C ${ox+EW},${oy+EH-r+cr} ${ox+r+cr},${oy+EH} ${ox+r},${oy+EH}` +
    ` C ${ox+r-cr},${oy+EH} ${ox},${oy+EH-r+cr} ${ox},${oy+EH-r}` +
    ` L ${ox},${oy+r} C ${ox},${oy+r-cr} ${ox+r-cr},${oy} ${ox+r},${oy} Z`
  );
}

function exportHiRes() {
  const EW = 5000, EH = 10000;
  const scale = Math.min(EW / W, EH / H);
  const dw = Math.round(W * scale);
  const dh = Math.round(H * scale);
  const ox = Math.round((EW - dw) / 2);
  const oy = Math.round((EH - dh) / 2);

  const out = document.createElement('canvas');
  out.width = EW; out.height = EH;
  const octx = out.getContext('2d');
  octx.fillStyle = '#000000';
  octx.fillRect(0, 0, EW, EH);

  const ePath = getExportDeckPath(scale, ox, oy);

  // Render background natively at full export resolution
  const tempBg = document.createElement('canvas');
  tempBg.width = dw; tempBg.height = dh;
  const tempCtx = tempBg.getContext('2d');
  if (activeMode === 'illustration' || (activeMode === 'custom' && customImgEl)) {
    const eImg = activeMode === 'illustration' ? illustrationImgs[activeIllustration] : customImgEl;
    drawBg(tempCtx, dw, dh, makeMonoPalette(illusBgColor), illusBgSeed);
    const eIY = Math.round(ILLUS_Y * scale);
    const eIH = Math.round(ILLUS_H * scale);
    const eIll = activeMode === 'illustration' ? ILLUSTRATION_DATA[activeIllustration] : {};
    tempCtx.save();
    tempCtx.beginPath(); tempCtx.rect(0, eIY, dw, eIH); tempCtx.clip();
    drawIllustration(tempCtx, dw, eIH, eImg, 0, eIY);
    if (eIll.skyOverlay) drawSkyOverlay(tempCtx, dw, eIY, eIH, eIll.skyOverlay);
    if (eIll.whiteBands) drawCamoBleedBands(tempCtx, dw, dh, eIY, eIH, makeMonoPalette(illusBgColor), illusBgSeed, eIll.whiteBands);
    tempCtx.restore();
    drawEdgeBleed(tempCtx, dw, dh, eIY, eIH, makeMonoPalette(illusBgColor), illusBgSeed);
  } else {
    drawBg(tempCtx, dw, dh, CAMO_PATTERNS[activeCamo].palettes, CAMO_PATTERNS[activeCamo].seed);
  }

  octx.save(); octx.clip(ePath);
  octx.drawImage(tempBg, ox, oy);
  octx.restore();

  // Logo: draw natively at export coordinates (no upscale artifacts)
  const _eli = getLogoImg();
  if (showLogo && _eli) {
    const drawH = dh * logoScale;
    const drawW = drawH * (_eli.naturalWidth / _eli.naturalHeight);
    const cx = ox + dw / 2;
    const cy = oy + dh / 2;
    octx.save();
    octx.clip(ePath);
    octx.translate(cx, cy);
    octx.rotate(-5 * Math.PI / 180);
    octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = 'high';
    octx.globalCompositeOperation = 'source-over';
    octx.globalAlpha = logoOpacity;
    octx.drawImage(_eli, -drawW / 2, -drawH / 2, drawW, drawH);
    octx.restore();
  }

  octx.save();
  octx.strokeStyle = 'rgba(210,210,212,0.40)';
  octx.lineWidth = 2;
  octx.stroke(ePath);
  octx.restore();

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'payday_deck_5000x10000.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ═══════════════════════════════════════════════════════
//  PDF EXPORT (3600×12600, 300 DPI at ~30cm deck width)
// ═══════════════════════════════════════════════════════

// Returns the camo/illustration/custom name used for the exported filename.
function getExportStyleName() {
  if (activeMode === 'camo') return CAMO_PATTERNS[activeCamo].name;
  if (activeMode === 'illustration') return ILLUSTRATION_DATA[activeIllustration].name;
  return 'CUSTOM';
}

// Builds a minimal single-page PDF with the given JPEG image as a DCTDecode XObject.
// ptW / ptH are the PDF page dimensions in points (72pt = 1 inch).
// All string content is ASCII so TextEncoder byte length == character length — this
// guarantees the xref byte offsets are exact.
function buildMinimalPDF(imgW, imgH, ptW, ptH, jpegBytes) {
  const te = new TextEncoder();
  const chunks = [];
  let pos = 0;
  const off = [];

  function s(str) { const b = te.encode(str); chunks.push(b); pos += b.length; }
  function b(buf)  { chunks.push(buf); pos += buf.length; }

  s('%PDF-1.4\n');

  off[1] = pos;
  s('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');

  off[2] = pos;
  s('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');

  off[3] = pos;
  s(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${ptW} ${ptH}] /Contents 4 0 R /Resources << /XObject << /Im0 5 0 R >> >> >>\nendobj\n`);

  // Content stream: scale image to fill the page exactly
  const cs = `q\n${ptW} 0 0 ${ptH} 0 0 cm\n/Im0 Do\nQ\n`;
  off[4] = pos;
  s(`4 0 obj\n<< /Length ${cs.length} >>\nstream\n${cs}endstream\nendobj\n`);

  off[5] = pos;
  s(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`);
  b(jpegBytes);
  s('\nendstream\nendobj\n');

  const xref = pos;
  s('xref\n0 6\n0000000000 65535 f \n');
  for (let i = 1; i <= 5; i++) s(String(off[i]).padStart(10, '0') + ' 00000 n \n');
  s(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF\n`);

  const result = new Uint8Array(pos);
  let cursor = 0;
  for (const c of chunks) { result.set(c, cursor); cursor += c.length; }
  return result;
}

// PDF export at 3600×12600 px (scale=9, deck fills canvas exactly — no black bars).
// Resolution rationale: the PNG export's 5000×10000 canvas has the deck in a 2857px-wide
// region, giving only 242 DPI at 30cm — below the 300 DPI print minimum. At scale=9,
// min(3600/400, 12600/1400) = min(9, 9) = 9, so the deck fills 3600×12600 exactly:
//   3600 / (30cm / 2.54) = 305 DPI at ~30cm deck width ✓
// PDF page: 864 × 3024 pt = 30.5cm × 107cm at 300 DPI (natural 1:3.5 deck proportions).
function exportPDF() {
  const scale = 9;
  const dw = W * scale;  // 3600
  const dh = H * scale;  // 12600

  const out = document.createElement('canvas');
  out.width = dw; out.height = dh;
  const octx = out.getContext('2d');
  octx.fillStyle = '#000000';
  octx.fillRect(0, 0, dw, dh);

  const ePath = getExportDeckPath(scale, 0, 0);

  const tempBg = document.createElement('canvas');
  tempBg.width = dw; tempBg.height = dh;
  const tempCtx = tempBg.getContext('2d');
  if (activeMode === 'illustration' || (activeMode === 'custom' && customImgEl)) {
    const eImg = activeMode === 'illustration' ? illustrationImgs[activeIllustration] : customImgEl;
    drawBg(tempCtx, dw, dh, makeMonoPalette(illusBgColor), illusBgSeed);
    const eIY = Math.round(ILLUS_Y * scale);
    const eIH = Math.round(ILLUS_H * scale);
    const eIll = activeMode === 'illustration' ? ILLUSTRATION_DATA[activeIllustration] : {};
    tempCtx.save();
    tempCtx.beginPath(); tempCtx.rect(0, eIY, dw, eIH); tempCtx.clip();
    drawIllustration(tempCtx, dw, eIH, eImg, 0, eIY);
    if (eIll.skyOverlay) drawSkyOverlay(tempCtx, dw, eIY, eIH, eIll.skyOverlay);
    if (eIll.whiteBands) drawCamoBleedBands(tempCtx, dw, dh, eIY, eIH, makeMonoPalette(illusBgColor), illusBgSeed, eIll.whiteBands);
    tempCtx.restore();
    drawEdgeBleed(tempCtx, dw, dh, eIY, eIH, makeMonoPalette(illusBgColor), illusBgSeed);
  } else {
    drawBg(tempCtx, dw, dh, CAMO_PATTERNS[activeCamo].palettes, CAMO_PATTERNS[activeCamo].seed);
  }

  octx.save(); octx.clip(ePath);
  octx.drawImage(tempBg, 0, 0);
  octx.restore();

  const _eli = getLogoImg();
  if (showLogo && _eli) {
    const drawH = dh * logoScale;
    const drawW = drawH * (_eli.naturalWidth / _eli.naturalHeight);
    octx.save();
    octx.clip(ePath);
    octx.translate(dw / 2, dh / 2);
    octx.rotate(-5 * Math.PI / 180);
    octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = 'high';
    octx.globalCompositeOperation = 'source-over';
    octx.globalAlpha = logoOpacity;
    octx.drawImage(_eli, -drawW / 2, -drawH / 2, drawW, drawH);
    octx.restore();
  }

  octx.save();
  octx.strokeStyle = 'rgba(210,210,212,0.40)';
  octx.lineWidth = 2;
  octx.stroke(ePath);
  octx.restore();

  // 300 DPI at natural deck dimensions (30.5cm × 107cm)
  const ptW = Math.round(dw * 72 / 300);
  const ptH = Math.round(dh * 72 / 300);

  out.toBlob(async (jpegBlob) => {
    const jpegBytes = new Uint8Array(await jpegBlob.arrayBuffer());
    const pdfBytes = buildMinimalPDF(dw, dh, ptW, ptH, jpegBytes);
    const url = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
    const a = document.createElement('a');
    a.href = url;
    a.download = `payday_${getExportStyleName()}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/jpeg', 0.95);
}

// ═══════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildCamoPresets();
  buildIllustrationPresets();
  applyCamo(0);

  document.getElementById('importFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      if (customImgUrl) URL.revokeObjectURL(customImgUrl);
      customImgUrl = url;
      customImgEl = img;
      activeMode = 'custom';
      clearAllPresetBtns();
      applyCustom();
    };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
    e.target.value = '';
  });

  document.getElementById('illusBgPicker').addEventListener('input', (e) => {
    if (activeMode === 'illustration' || activeMode === 'custom') {
      illusBgColor = e.target.value;
      bgCtx.clearRect(0, 0, W, H);
      drawBg(bgCtx, W, H, makeMonoPalette(illusBgColor), illusBgSeed);
      if (activeMode === 'illustration') {
        const img = illustrationImgs[activeIllustration];
        const ill = ILLUSTRATION_DATA[activeIllustration];
        const pal = makeMonoPalette(illusBgColor);
        bgCtx.save();
        bgCtx.beginPath(); bgCtx.rect(0, ILLUS_Y, W, ILLUS_H); bgCtx.clip();
        drawIllustration(bgCtx, W, ILLUS_H, img, 0, ILLUS_Y);
        if (ill.skyOverlay) drawSkyOverlay(bgCtx, W, ILLUS_Y, ILLUS_H, ill.skyOverlay);
        if (ill.whiteBands) drawCamoBleedBands(bgCtx, W, H, ILLUS_Y, ILLUS_H, pal, illusBgSeed, ill.whiteBands);
        bgCtx.restore();
        drawEdgeBleed(bgCtx, W, H, ILLUS_Y, ILLUS_H, pal, illusBgSeed);
      } else if (customImgEl) {
        bgCtx.save();
        bgCtx.beginPath(); bgCtx.rect(0, ILLUS_Y, W, ILLUS_H); bgCtx.clip();
        drawIllustration(bgCtx, W, ILLUS_H, customImgEl, 0, ILLUS_Y);
        bgCtx.restore();
        drawIllusEdgeFades(bgCtx, W, ILLUS_Y, ILLUS_H, illusBgColor);
      }
      redraw();
    }
  });

  document.getElementById('logoOpacitySlider').addEventListener('input', (e) => {
    logoOpacity = e.target.value / 100;
    redraw();
  });

  document.getElementById('logoScaleSlider').addEventListener('input', (e) => {
    logoScale = e.target.value / 100;
    redraw();
  });
});
</script>
