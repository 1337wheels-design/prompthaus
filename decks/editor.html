<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PAYDAY DECK EDITOR — Üpark Payday 2026</title>
<style>
:root {
  --bg:      #040e0c;
  --panel:   #071210;
  --border:  rgba(240,208,80,0.18);
  --gold:    #f0d060;
  --gold-lo: #7a5008;
  --coral:   #ff6b47;
  --aqua:    #00c8b0;
  --silver:  #d0d0d2;
  --dim:     rgba(208,208,210,0.45);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Courier New', Courier, monospace;
  color: var(--silver);
  padding: 32px 16px 56px;
  user-select: none;
}

/* ── header ───────────────────────────────────────── */
.hd { text-align:center; margin-bottom:28px; }
.hd h1 {
  font-size: clamp(1.1rem,3.5vw,1.9rem);
  letter-spacing:.35em; color:var(--gold);
  text-transform:uppercase; line-height:1;
  margin-bottom:8px;
}
.hd .sub {
  font-size:.55rem; letter-spacing:.22em;
  color:var(--aqua); text-transform:uppercase;
}
.hd .nav-link {
  font-size:.5rem; letter-spacing:.15em;
  color:var(--dim); text-decoration:none;
  border-bottom:1px solid transparent;
  transition:color .15s, border-color .15s;
  margin-top:10px; display:inline-block;
}
.hd .nav-link:hover { color:var(--silver); border-color:var(--silver); }

/* ── workspace ────────────────────────────────────── */
.workspace {
  display:grid;
  grid-template-columns: 180px auto 140px;
  gap:20px;
  align-items:start;
  width:100%;
  max-width:700px;
}

/* ── panels ───────────────────────────────────────── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 14px 12px;
  display:flex; flex-direction:column; gap:14px;
}
.panel-title {
  font-size:.5rem; letter-spacing:.25em;
  color:var(--gold); text-transform:uppercase;
  border-bottom:1px solid var(--border); padding-bottom:8px;
}

/* ── obstacle presets ─────────────────────────────── */
.presets {
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
}
.preset-btn {
  position:relative; height:52px; border:1px solid transparent;
  cursor:pointer; overflow:hidden; transition:border-color .15s;
  background:none; padding:0;
}
.preset-btn:hover, .preset-btn.active { border-color:var(--gold); }
.preset-btn canvas { width:100%; height:100%; display:block; }
.preset-btn .zone-tag {
  position:absolute; bottom:2px; left:3px;
  font-size:.38rem; letter-spacing:.12em;
  color:rgba(255,255,255,0.75); text-shadow:0 0 4px #000;
  pointer-events:none;
}

/* ── color swatches ───────────────────────────────── */
.swatches {
  display:grid; grid-template-columns:repeat(4,1fr); gap:5px;
}
.sw {
  width:100%; aspect-ratio:1/1; cursor:pointer;
  border:2px solid transparent; transition:border-color .1s, transform .1s;
}
.sw:hover { transform:scale(1.12); }
.sw.active { border-color:#fff; }

/* custom color */
.custom-row {
  display:flex; align-items:center; gap:8px;
}
.custom-row label { font-size:.48rem; letter-spacing:.1em; color:var(--dim); }
#customColor {
  width:32px; height:22px; border:none; padding:0;
  background:none; cursor:pointer;
}

/* ── canvas area ──────────────────────────────────── */
.canvas-wrap {
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
#mainCanvas {
  display:block;
  width:200px; height:700px;
  cursor:crosshair;
  filter: drop-shadow(0 6px 24px rgba(0,0,0,0.9)) drop-shadow(0 2px 8px rgba(95,58,114,0.35));
  touch-action:none;
}
.undo-row {
  display:flex; gap:8px;
}

/* ── tool panel ───────────────────────────────────── */
.tools { display:flex; flex-direction:column; gap:10px; }
.tool-group { display:flex; flex-direction:column; gap:6px; }
.tool-group-label {
  font-size:.44rem; letter-spacing:.18em;
  color:var(--dim); text-transform:uppercase;
}
.tool-btn {
  background:transparent; border:1px solid rgba(208,208,210,0.25);
  color:var(--silver); font-family:inherit;
  font-size:.5rem; letter-spacing:.15em;
  padding:7px 8px; cursor:pointer; text-align:left;
  text-transform:uppercase; transition:all .12s;
  width:100%;
}
.tool-btn:hover { border-color:var(--gold); color:var(--gold); }
.tool-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(240,208,80,0.07); }

.size-row {
  display:flex; gap:5px;
}
.size-btn {
  flex:1; background:transparent;
  border:1px solid rgba(208,208,210,0.2);
  color:var(--dim); font-family:inherit;
  font-size:.45rem; padding:5px 2px;
  cursor:pointer; text-align:center;
  transition:all .12s;
}
.size-btn.active, .size-btn:hover {
  border-color:var(--aqua); color:var(--aqua);
}

.toggle-row {
  display:flex; align-items:center; gap:8px;
}
.toggle-label { font-size:.48rem; letter-spacing:.1em; color:var(--dim); }
.toggle-btn {
  width:32px; height:18px; position:relative;
  background:rgba(208,208,210,0.15); border:1px solid rgba(208,208,210,0.2);
  cursor:pointer; border-radius:9px; transition:background .15s;
  flex-shrink:0;
}
.toggle-btn.on { background:rgba(0,200,176,0.35); border-color:var(--aqua); }
.toggle-btn::after {
  content:''; position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%;
  background:var(--silver); transition:left .15s;
}
.toggle-btn.on::after { left:16px; background:var(--aqua); }

.action-btn {
  background:transparent; border:1px solid var(--gold);
  color:var(--gold); font-family:inherit;
  font-size:.5rem; letter-spacing:.18em;
  padding:8px 6px; cursor:pointer;
  text-transform:uppercase; transition:all .12s;
  width:100%; text-align:center;
}
.action-btn:hover { background:var(--gold); color:var(--bg); }
.action-btn.danger {
  border-color:var(--coral); color:var(--coral);
}
.action-btn.danger:hover { background:var(--coral); color:#fff; }

/* ── responsive ───────────────────────────────────── */
@media (max-width:580px) {
  .workspace {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    max-width:320px;
  }
  .panel { padding:10px; }
  .presets { grid-template-columns:repeat(4,1fr); }
  .preset-btn { height:38px; }
  #mainCanvas { width:200px; height:700px; }
}
</style>
</head>
<body>

<header class="hd">
  <h1>DECK EDITOR</h1>
  <p class="sub">Paint your own — Üpark Payday 2026</p>
  <a class="nav-link" href="index.html">← Back to Deck Viewer</a>
</header>

<div class="workspace">

  <!-- LEFT: palette panel -->
  <aside class="panel" id="leftPanel">
    <div class="panel-title">Obstacles</div>
    <div class="presets" id="presets"></div>

    <div class="panel-title">Colors</div>
    <div class="swatches" id="swatches"></div>
    <div class="custom-row">
      <label>CUSTOM</label>
      <input type="color" id="customColor" value="#ff6b47" oninput="pickCustom(this.value)">
    </div>
  </aside>

  <!-- CENTER: canvas -->
  <div class="canvas-wrap">
    <canvas id="mainCanvas" width="400" height="1400"></canvas>
    <div class="undo-row">
      <button class="tool-btn" style="flex:1;text-align:center;" onclick="undo()">↩ Undo</button>
      <button class="tool-btn danger" style="flex:1;text-align:center;border-color:var(--coral);color:var(--coral);" onclick="clearDraw()">✕ Clear</button>
    </div>
  </div>

  <!-- RIGHT: tools panel -->
  <aside class="panel">
    <div class="panel-title">Tool</div>
    <div class="tool-group">
      <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">✏ Brush</button>
      <button class="tool-btn" id="btn-spray" onclick="setTool('spray')">◎ Spray</button>
      <button class="tool-btn" id="btn-fill" onclick="setTool('fill')">◼ Fill All</button>
      <button class="tool-btn" id="btn-erase" onclick="setTool('erase')">◻ Erase</button>
    </div>

    <div class="tool-group">
      <div class="tool-group-label">Size</div>
      <div class="size-row">
        <button class="size-btn" onclick="setSize(4)">S</button>
        <button class="size-btn active" onclick="setSize(10)">M</button>
        <button class="size-btn" onclick="setSize(20)">L</button>
        <button class="size-btn" onclick="setSize(36)">XL</button>
        <button class="size-btn" onclick="setSize(60)">2X</button>
      </div>
    </div>

    <div class="tool-group">
      <div class="tool-group-label">Logo</div>
      <div class="toggle-row">
        <div class="toggle-btn on" id="logoToggle" onclick="toggleLogo()"></div>
        <span class="toggle-label">PAYDAY</span>
      </div>
    </div>

    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
      <button class="action-btn" onclick="download()">↓ Download</button>
    </div>
  </aside>

</div><!-- /workspace -->

// ═══════════════════════════════════════════════════════
//  DECK PATH (100×350 → scaled 4× to 400×1400)
// ═══════════════════════════════════════════════════════
const DECK_PATH_STR = 'M 200,0 C 310.4,0 400,89.6 400,200 L 400,1200 C 400,1310.4 310.4,1400 200,1400 C 89.6,1400 0,1310.4 0,1200 L 0,200 C 0,89.6 89.6,0 200,0 Z';
function getDeckPath() { return new Path2D(DECK_PATH_STR); }

// ═══════════════════════════════════════════════════════
//  INIT UI
// ═══════════════════════════════════════════════════════
function buildPresets() {
  const container = document.getElementById('presets');
  OBSTACLES.forEach((ob, i) => {
    // Mini preview canvas
    const mc = document.createElement('canvas');
    mc.width = 60; mc.height = 80;
    const mctx = mc.getContext('2d');
    const mpath = new Path2D('M 30,0 C 46.6,0 60,13.4 60,30 L 60,50 C 60,66.6 46.6,80 30,80 C 13.4,80 0,66.6 0,50 L 0,30 C 0,13.4 13.4,0 30,0 Z');
    mctx.clip(mpath);
    ob.draw(mctx, 60, 80);
    mctx.strokeStyle = 'rgba(255,255,255,0.15)';
    mctx.lineWidth = 1;
    mctx.stroke(mpath);

    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
    btn.id = 'preset-' + i;
    btn.appendChild(mc);

    const tag = document.createElement('span');
    tag.className = 'zone-tag';
    tag.textContent = ob.zone;
    btn.appendChild(tag);

    btn.addEventListener('click', () => applyPreset(i));
    container.appendChild(btn);
  });
}

function buildSwatches() {
  const container = document.getElementById('swatches');
  PALETTE.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'sw' + (hex === currentColor ? ' active' : '');
    sw.style.background = hex;
    sw.style.outline = hex === '#000000' ? '1px solid #333' : '';
    sw.addEventListener('click', () => selectColor(hex, sw));
    container.appendChild(sw);
  });
  // add obstacle accents
  OBSTACLES.forEach(ob => {
    const sw = document.createElement('div');
    sw.className = 'sw';
    sw.style.background = ob.accent;
    sw.addEventListener('click', () => selectColor(ob.accent, sw));
    container.appendChild(sw);
  });
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function redraw() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const path = getDeckPath();

  ctx.clearRect(0, 0, W, H);

  // 1. background layer (clipped)
  ctx.save();
  ctx.clip(path);
  ctx.drawImage(bgCanvas, 0, 0);
  ctx.restore();

  // 2. drawing layer (clipped)
  ctx.save();
  ctx.clip(path);
  ctx.drawImage(drawCanvas, 0, 0);
  ctx.restore();

  // 3. logo overlay (screen blend, clipped)
  if (showLogo && logoImg) {
    const lw = W * 0.88;
    const lh = lw * (741 / 1600);
    const lx = (W - lw) / 2;
    const ly = H * 0.44 - lh / 2;
    ctx.save();
    ctx.clip(path);
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(logoImg, lx, ly, lw, lh);
    ctx.restore();
  }

  // 4. edge highlight
  ctx.save();
  ctx.strokeStyle = 'rgba(208,208,210,0.1)';
  ctx.lineWidth = 1.5;
  ctx.stroke(path);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  PRESET APPLICATION
// ═══════════════════════════════════════════════════════
function applyPreset(idx) {
  activePreset = idx;
  document.querySelectorAll('.preset-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  bgCtx.clearRect(0, 0, W, H);
  OBSTACLES[idx].draw(bgCtx, W, H);
  redraw();
}

// ═══════════════════════════════════════════════════════
//  COLOR SELECTION
// ═══════════════════════════════════════════════════════
function selectColor(hex, el) {
  currentColor = hex;
  document.getElementById('customColor').value = hex.length === 7 ? hex : currentColor;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function pickCustom(hex) {
  currentColor = hex;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
}

// ═══════════════════════════════════════════════════════
//  TOOL SELECTION
// ═══════════════════════════════════════════════════════
function setTool(name) {
  currentTool = name;
  ['brush','spray','fill','erase'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    if (btn) btn.classList.toggle('active', t === name);
  });
}

function setSize(sz) {
  brushSize = sz;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════
function getCanvasPos(e) {
  const canvas = document.getElementById('mainCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

function pushUndo() {
  const snap = document.createElement('canvas');
  snap.width = W; snap.height = H;
  snap.getContext('2d').drawImage(drawCanvas, 0, 0);
  undoStack.push(snap);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function applyBrush(x, y) {
  if (currentTool === 'erase') {
    drawCtx.save();
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.beginPath();
    drawCtx.arc(x, y, brushSize, 0, Math.PI * 2);
    drawCtx.fillStyle = 'rgba(0,0,0,1)';
    drawCtx.fill();
    drawCtx.restore();
    return;
  }

  if (currentTool === 'brush') {
    drawCtx.save();
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.strokeStyle = currentColor;
    drawCtx.lineWidth = brushSize * 2;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.beginPath();
    drawCtx.moveTo(lastX, lastY);
    drawCtx.lineTo(x, y);
    drawCtx.stroke();
    drawCtx.restore();
  } else if (currentTool === 'spray') {
    const density = Math.max(6, brushSize * 1.5);
    for (let i = 0; i < density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * brushSize * 1.4;
      const px = x + Math.cos(angle) * r;
      const py = y + Math.sin(angle) * r;
      drawCtx.save();
      drawCtx.globalAlpha = 0.2 + Math.random() * 0.5;
      drawCtx.fillStyle = currentColor;
      drawCtx.beginPath();
      drawCtx.arc(px, py, 1 + Math.random() * 1.5, 0, Math.PI * 2);
      drawCtx.fill();
      drawCtx.restore();
    }
  }
}

function onPointerDown(e) {
  e.preventDefault();
  if (currentTool === 'fill') {
    pushUndo();
    drawCtx.save();
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.fillStyle = currentColor;
    drawCtx.fillRect(0, 0, W, H);
    drawCtx.restore();
    redraw();
    return;
  }
  pushUndo();
  isDrawing = true;
  const pos = getCanvasPos(e);
  lastX = pos.x; lastY = pos.y;
  applyBrush(pos.x, pos.y);
  redraw();
}

function onPointerMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getCanvasPos(e);
  applyBrush(pos.x, pos.y);
  lastX = pos.x; lastY = pos.y;
  redraw();
}

function onPointerUp(e) {
  e.preventDefault();
  isDrawing = false;
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function undo() {
  if (!undoStack.length) return;
  const snap = undoStack.pop();
  drawCtx.clearRect(0, 0, W, H);
  drawCtx.drawImage(snap, 0, 0);
  redraw();
}

function clearDraw() {
  pushUndo();
  drawCtx.clearRect(0, 0, W, H);
  redraw();
}

function toggleLogo() {
  showLogo = !showLogo;
  const btn = document.getElementById('logoToggle');
  btn.classList.toggle('on', showLogo);
  redraw();
}

function download() {
  // Composite to offscreen at full res
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const octx = out.getContext('2d');
  const path = getDeckPath();

  octx.clip(path);
  octx.drawImage(bgCanvas, 0, 0);
  octx.drawImage(drawCanvas, 0, 0);

  if (showLogo && logoImg) {
    const lw = W * 0.88;
    const lh = lw * (741 / 1600);
    const lx = (W - lw) / 2;
    const ly = H * 0.44 - lh / 2;
    octx.globalCompositeOperation = 'screen';
    octx.drawImage(logoImg, lx, ly, lw, lh);
  }

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const zone = OBSTACLES[activePreset].zone.toLowerCase();
    a.href = url;
    a.download = `payday_deck_custom_zone${zone}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ═══════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildPresets();
  buildSwatches();
  applyPreset(0);

  const canvas = document.getElementById('mainCanvas');
  canvas.addEventListener('mousedown',  onPointerDown);
  canvas.addEventListener('mousemove',  onPointerMove);
  canvas.addEventListener('mouseup',    onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive:false});
  canvas.addEventListener('touchmove',  onPointerMove, {passive:false});
  canvas.addEventListener('touchend',   onPointerUp);
});
</script>
</body>
</html>
