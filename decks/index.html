<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PAYDAY DECKS — Üpark Payday 2026</title>
<style>
:root {
  --bg: #040e0c;
  --bg2: #081510;
  --gold: #f0d060;
  --coral: #ff6b47;
  --aqua: #00c8b0;
  --purple: #8d61a6;
  --purple-d: #5f3a72;
  --silver: #d0d0d2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 64px;
  font-family: 'Courier New', Courier, monospace;
  color: var(--silver);
}

/* header */
.site-header {
  text-align: center;
  margin-bottom: 48px;
}
.site-header h1 {
  font-size: clamp(1.4rem, 4vw, 2.4rem);
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 10px;
}
.site-header .sub {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--aqua);
  text-transform: uppercase;
}
.divider {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 18px auto;
}

/* controls */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 40px;
  flex-wrap: wrap;
  justify-content: center;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--aqua);
  color: var(--aqua);
  font-family: inherit;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  padding: 7px 18px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.ctrl-btn:hover { background: var(--aqua); color: var(--bg); }

/* decks grid */
.decks {
  display: flex;
  gap: 64px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: flex-start;
}
.deck-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.deck-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--silver);
  opacity: 0.7;
}
.deck-label span {
  color: var(--gold);
  opacity: 1;
}
canvas {
  display: block;
  width: 200px;
  height: 700px;
  cursor: default;
  /* subtle drop shadow for deck float */
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.85)) drop-shadow(0 2px 8px rgba(95,58,114,0.4));
}
.dl-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: inherit;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  padding: 7px 20px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.dl-btn:hover { background: var(--gold); color: var(--bg); }

/* footer */
.page-footer {
  margin-top: 64px;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  color: var(--silver);
  opacity: 0.35;
  text-align: center;
  text-transform: uppercase;
}
</style>
</head>
<body>

<header class="site-header">
  <h1>PAYDAY DECKS</h1>
  <div class="divider"></div>
  <p class="sub">Üpark Payday 2026 &middot; Deck Design Preview</p>
</header>

<div class="controls">
  <button class="ctrl-btn" onclick="regenerate()">↻ Regenerate Patterns</button>
</div>

<div class="decks">
  <div class="deck-wrap">
    <div class="deck-label"><span>CAMO</span> STYLE</div>
    <canvas id="cv-camo" width="400" height="1400"></canvas>
    <button class="dl-btn" onclick="download('cv-camo','payday_deck_camo')">↓ Download PNG</button>
  </div>
  <div class="deck-wrap">
    <div class="deck-label"><span>STAR</span> RAIN</div>
    <canvas id="cv-star" width="400" height="1400"></canvas>
    <button class="dl-btn" onclick="download('cv-star','payday_deck_starrain')">↓ Download PNG</button>
  </div>
</div>

<footer class="page-footer">
  <p>Pay Day Skateboards &middot; Bremen 2026 &middot; Üpark Payday Vol. 2</p>
</footer>

<script>
// ─── Seeded PRNG (LCG) ─────────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => {
    s = (Math.imul(1664525, s) + 1013904223) >>> 0;
    return s / 4294967296;
  };
}
let SEED = 42;

// ─── Deck Path (100 × 350 normalized, k=0.5523) ───────────────────────────
// Scale: scaleX=4, scaleY=4 → 400×1400 canvas
const DECK_PATH_STR = 'M 200,0 C 310.4,0 400,89.6 400,200 L 400,1200 C 400,1310.4 310.4,1400 200,1400 C 89.6,1400 0,1310.4 0,1200 L 0,200 C 0,89.6 89.6,0 200,0 Z';

function getDeckPath() {
  return new Path2D(DECK_PATH_STR);
}

// ─── Camo drawing ─────────────────────────────────────────────────────────
function drawCamo(ctx, w, h, rng) {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, w, h);

  // Color layers, painted darkest to lightest
  const layers = [
    // base dark fill — charcoal texture across whole deck
    { colors: ['#1a1a1c', '#1e1c20', '#222026', '#363538'], count: 30, minR: 0.18, maxR: 0.42, alpha: 1.0 },
    // mid camo blobs — dark purple
    { colors: ['#3a1f4a', '#5f3a72', '#6e2a6f', '#4a2460'], count: 28, minR: 0.10, maxR: 0.30, alpha: 0.88 },
    // medium purple blobs
    { colors: ['#8d61a6', '#7a4e8c', '#863780'], count: 20, minR: 0.06, maxR: 0.22, alpha: 0.75 },
    // silver-gray highlights
    { colors: ['#bababa', '#d0d0d2', '#9c9c9c'], count: 10, minR: 0.04, maxR: 0.12, alpha: 0.45 },
  ];

  for (const layer of layers) {
    for (let i = 0; i < layer.count; i++) {
      const cx = rng() * w;
      const cy = rng() * h;
      const color = layer.colors[Math.floor(rng() * layer.colors.length)];
      const r = (layer.minR + rng() * (layer.maxR - layer.minR)) * w;
      const pts = 5 + Math.floor(rng() * 5); // 5-9 vertices

      ctx.save();
      ctx.globalAlpha = layer.alpha * (0.7 + rng() * 0.3);
      ctx.beginPath();

      // Organic blob: random vertices around center, connected with cubic beziers
      const angles = Array.from({length: pts}, (_, j) => (j / pts) * Math.PI * 2 + rng() * 0.4);
      const radii  = Array.from({length: pts}, () => r * (0.55 + rng() * 0.7));

      const xs = angles.map((a, j) => cx + Math.cos(a) * radii[j]);
      const ys = angles.map((a, j) => cy + Math.sin(a) * radii[j]);

      ctx.moveTo((xs[pts-1] + xs[0]) / 2, (ys[pts-1] + ys[0]) / 2);
      for (let j = 0; j < pts; j++) {
        const nx = xs[(j + 1) % pts];
        const ny = ys[(j + 1) % pts];
        ctx.quadraticCurveTo(xs[j], ys[j], (xs[j] + nx) / 2, (ys[j] + ny) / 2);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }
  }
}

// ─── Star Rain drawing ────────────────────────────────────────────────────
let shootingStars = [];
function initShootingStars(rng) {
  shootingStars = [];
  for (let i = 0; i < 8; i++) {
    shootingStars.push({
      x: 20 + rng() * 360,
      y: rng() * 1400,
      len: 12 + rng() * 28,
      speed: 0.25 + rng() * 0.45,
      alpha: 0.35 + rng() * 0.55,
    });
  }
}

function drawStarRain(ctx, w, h, rng, staticOnly) {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, w, h);

  // Static stars
  const NUM = 380;
  for (let i = 0; i < NUM; i++) {
    const x = rng() * w;
    const y = rng() * h;
    const r = 0.5 + rng() * 2.2;
    const alpha = 0.3 + rng() * 0.7;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = rng() < 0.1 ? '#c8a0ff' : '#ffffff';
    ctx.fill();
    ctx.restore();
  }

  // Subtle glow around a few bright stars
  for (let i = 0; i < 15; i++) {
    const x = 30 + rng() * 340;
    const y = rng() * h;
    const r = 1.5 + rng() * 1.5;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
    grad.addColorStop(0, 'rgba(255,255,255,0.6)');
    grad.addColorStop(0.3, 'rgba(200,160,255,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
  }
}

function drawShootingStars(ctx) {
  // Animated shooting star streaks
  for (const s of shootingStars) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len * 0.18, s.y + s.len);
    ctx.stroke();

    // Fade head
    const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.len * 0.18, s.y + s.len);
    grad.addColorStop(0, 'rgba(255,255,255,0.0)');
    grad.addColorStop(1, 'rgba(255,255,255,0.7)');
    ctx.strokeStyle = grad;
    ctx.stroke();
    ctx.restore();
  }
}

// ─── Render helpers ───────────────────────────────────────────────────────
function renderDeck(canvasId, drawFn, logoImg, rng, drawLogo) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const path = getDeckPath();

  // Clear
  ctx.clearRect(0, 0, w, h);

  // Clip to deck shape, draw pattern
  ctx.save();
  ctx.clip(path);
  drawFn(ctx, w, h, rng);
  ctx.restore();

  // Logo overlay (screen blend)
  if (drawLogo && logoImg) {
    const logoW = w * 0.9;
    const logoH = logoW * (900 / 1600);
    const logoX = (w - logoW) / 2;
    const logoY = h * 0.45 - logoH / 2;

    ctx.save();
    ctx.clip(path);
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);
    ctx.restore();
  }

  // Deck edge outline
  ctx.save();
  ctx.strokeStyle = 'rgba(208,208,210,0.12)';
  ctx.lineWidth = 1.5;
  ctx.stroke(path);
  ctx.restore();
}

// ─── Static star canvas + animated overlay ────────────────────────────────
let staticStarCanvas = null;
function buildStaticStar(rng) {
  staticStarCanvas = document.createElement('canvas');
  staticStarCanvas.width = 400;
  staticStarCanvas.height = 1400;
  const ctx = staticStarCanvas.getContext('2d');
  const path = getDeckPath();
  ctx.clip(path);
  drawStarRain(ctx, 400, 1400, rng, true);
}

let animRunning = false;
function animateStar(logoImg, starRng) {
  const canvas = document.getElementById('cv-star');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const path = getDeckPath();

  function tick() {
    if (!animRunning) return;

    ctx.clearRect(0, 0, w, h);

    // Blit static star layer
    if (staticStarCanvas) {
      ctx.save();
      ctx.clip(path);
      ctx.drawImage(staticStarCanvas, 0, 0);
      ctx.restore();
    }

    // Animate shooting stars
    ctx.save();
    ctx.clip(path);
    drawShootingStars(ctx);
    ctx.restore();

    // Logo
    if (logoImg) {
      const logoW = w * 0.9;
      const logoH = logoW * (900 / 1600);
      const logoX = (w - logoW) / 2;
      const logoY = h * 0.45 - logoH / 2;
      ctx.save();
      ctx.clip(path);
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);
      ctx.restore();
    }

    // Edge
    ctx.save();
    ctx.strokeStyle = 'rgba(208,208,210,0.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke(path);
    ctx.restore();

    // Advance shooting stars
    for (const s of shootingStars) {
      s.y += s.speed;
      if (s.y > h + 40) { s.y = -40; s.x = 20 + Math.random() * 360; }
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ─── Download ─────────────────────────────────────────────────────────────
function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ─── Main init ────────────────────────────────────────────────────────────
let LOGO_IMG = null;
function drawAll() {
  animRunning = false;

  const camoRng = mkRng(SEED);
  const starRng = mkRng(SEED + 1);

  renderDeck('cv-camo', drawCamo, LOGO_IMG, camoRng, true);

  // Build static star base
  buildStaticStar(mkRng(SEED + 1));

  // Initial static render of star deck
  renderDeck('cv-star', (ctx, w, h, rng) => {
    // just draw the static star layer
    if (staticStarCanvas) ctx.drawImage(staticStarCanvas, 0, 0);
  }, LOGO_IMG, starRng, true);

  // Start animation
  initShootingStars(mkRng(SEED + 99));
  animRunning = true;
  animateStar(LOGO_IMG, starRng);
}

function regenerate() {
  SEED = Math.floor(Math.random() * 999999);
  drawAll();
}
